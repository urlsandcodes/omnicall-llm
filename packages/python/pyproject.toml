[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "omnicall-llm-caller"
version = "1.0.6"
description = "Unified multi-provider LLM caller with automatic fallback"
readme = "README.md"
requires-python = ">=3.8"
license = {text = "MIT"}
classifiers = [
    "Programming Language :: Python :: 3",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
]
dependencies = []

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
]

[tool.hatch.build.targets.wheel]
packages = ["src/omnicall_llm"]
